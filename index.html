<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕊蕊18岁生日快乐！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 爱心背景动画 */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 182, 193, 0.6);
            clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 50% 75%, 18% 100%, 0% 35%);
            animation: float 6s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
        }
        
        /* 主容器 */
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 90%;
            z-index: 10;
            position: relative;
        }
        
        h1 {
            color: #ff6b81;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        p {
            color: #555;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        /* 图片轮播 */
        .carousel {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        .carousel img.active {
            opacity: 1;
        }
        
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            color: #ff6b81;
            z-index: 20;
        }
        
        .prev { left: 20px; }
        .next { right: 20px; }
        
        /* 弹幕 */
        .danmaku {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            font-size: 18px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: danmaku-move 8s linear forwards;
        }
        
        @keyframes danmaku-move {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
        
        /* 烟花与彩带 */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: firework-explode 1s ease-out forwards;
        }
        
        @keyframes firework-explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(20); opacity: 0; }
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b81;
            animation: confetti-fall 3s linear forwards;
        }
        
        @keyframes confetti-fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        /* 开始按钮 */
        .start-btn {
            background: #ff6b81;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.3);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.4);
        }
        
        /* 隐藏初始内容 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 爱心背景 -->
    <div id="hearts"></div>
    
    <!-- 弹幕层 -->
    <div class="danmaku" id="danmaku"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <div id="initial-screen">
            <h1>🎉 羊羊祝蕊蕊18岁生日快乐！ 🎉</h1>
            <p>点击下方按钮，开启专属你的生日惊喜！</p>
            <button class="start-btn" onclick="startCelebration()">开启惊喜</button>
        </div>
        
        <div id="celebration-screen" class="hidden">
            <h1>🎂 蕊蕊，18岁生日快乐！ 🎂</h1>
            <p>愿你永远被爱包围，梦想成真，笑容灿烂！</p>
            
            <!-- 图片轮播 -->
            <div class="carousel">
                <img src="photo1.jpg" alt="蕊蕊的照片1" class="active">
                <img src="photo2.jpg" alt="蕊蕊的照片2">
                <img src="photo3.jpg" alt="蕊蕊的照片3">
                <img src="photo4.jpg" alt="蕊蕊的照片4">
                <img src="photo5.jpg" alt="蕊蕊的照片5">
                <img src="photo6.jpg" alt="蕊蕊的照片6">
                <img src="photo7.jpg" alt="蕊蕊的照片7">
                <img src="photo8.jpg" alt="蕊蕊的照片8">
                <button class="carousel-btn prev" onclick="changeSlide(-1)">❮</button>
                <button class="carousel-btn next" onclick="changeSlide(1)">❯</button>
            </div>
        </div>
    </div>

    <script>
        // 生成爱心背景
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heartsContainer.appendChild(heart);
            }
        }
        
        // 弹幕系统
        const messages = [
            "蕊蕊18岁生日快乐！",
            "羊羊祝你永远开心！",
            "愿你的18岁充满阳光！",
            "梦想成真，未来可期！",
            "你是最棒的！",
            "生日快乐，我的宝贝！",
            "18岁，新的开始！",
            "愿你被世界温柔以待！"
        ];
        
        function createDanmaku() {
            const danmakuContainer = document.getElementById('danmaku');
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const danmaku = document.createElement('div');
            danmaku.className = 'danmaku-item';
            danmaku.textContent = msg;
            danmaku.style.top = Math.random() * 80 + 10 + '%';
            danmaku.style.fontSize = (Math.random() * 10 + 16) + 'px';
            danmaku.style.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            danmakuContainer.appendChild(danmaku);
            
            setTimeout(() => {
                danmaku.remove();
            }, 8000);
        }
        
        // 烟花与彩带
        function createFirework() {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.5;
            const colors = ['#ff6b81', '#ff9a9e', '#fecfef', '#ffd1dc'];
            
            for (let i = 0; i < 20; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                firework.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(firework);
                
                setTimeout(() => {
                    firework.remove();
                }, 1000);
            }
        }
        
        function createConfetti() {
            const colors = ['#ff6b81', '#ff9a9e', '#fecfef', '#ffd1dc', '#fff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }
        
        // 图片轮播
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel img');
        
        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        
        // 自动轮播
        setInterval(() => {
            changeSlide(1);
        }, 5000);
        
        // 开始庆祝
        function startCelebration() {
            document.getElementById('initial-screen').classList.add('hidden');
            document.getElementById('celebration-screen').classList.remove('hidden');
            
            // 启动弹幕
            setInterval(createDanmaku, 1000);
            
            // 启动烟花与彩带
            setInterval(createFirework, 2000);
            setInterval(createConfetti, 3000);
            
            // 初始烟花与彩带
            createFirework();
            createConfetti();
        }
        
        // 初始化
        createHearts();
    </script>
</body>
</html>
