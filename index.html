<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 祝蕊蕊生日快乐！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfcfb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 纸屑动画 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(720deg); }
        }

        /* 主内容卡片 */
        .card {
            background: rgba(255,255,255,0.9);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 10;
            animation: popIn 0.8s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cake { font-size: 5rem; animation: bounce 1s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
        }

        p { font-size: 1.3rem; color: #666; margin-bottom: 2rem; line-height: 1.8; }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #f5576c, #ff6b9d);
            color: white;
            padding: 1rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(245,87,108,0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(245,87,108,0.6); }

        /* 气球动画 */
        .balloon {
            position: fixed;
            bottom: -100px;
            font-size: 3rem;
            animation: floatUp linear infinite;
            z-index: 1;
        }
        @keyframes floatUp {
            to { transform: translateY(-110vh) rotate(20deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="cake">🎂</div>
        <h1>蕊蕊，生日快乐！</h1>
        <p>愿你的每一天都充满阳光与欢笑<br>所有的美好都如期而至 ✨</p >
        <button class="btn" onclick="celebrate()">🎉 再撒一次纸屑</button>
    </div>

    <script>
        // 生成纸屑
        function createConfetti() {
            const colors = ['#f5576c','#4facfe','#f093fb','#43e97b','#fa709a','#fee140'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // 生成气球
        function createBalloons() {
            const emojis = ['🎈','🎈','🎈','🎁','🎀'];
            for (let i = 0; i < 8; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (Math.random() * 5 + 5) + 's';
                balloon.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(balloon);
                setTimeout(() => balloon.remove(), 10000);
            }
        }

        function celebrate() {
            createConfetti();
            createBalloons();
        }

        // 页面加载自动庆祝
        window.onload = celebrate;
    </script>
</body>
</html>
